kind = "mobile"
previewPath = "/"
title = "Elite eSports"
version = "1.0.0"
id = "artifacts/elite-esports"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 18977

[services.development]
run = "sh -c 'cd /home/runner/workspace && npm run dev -w @workspace/elite-esports'"

[services.production]
build = [ "sh", "-c", "cd /home/runner/workspace && npm run build -w @workspace/elite-esports" ]
run = [ "sh", "-c", "cd /home/runner/workspace && npm run serve -w @workspace/elite-esports" ]

[services.env]
PORT = "18977"
BASE_PATH = "/"
