name: Build Android APK (Stable Fixed)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: artifacts/elite-esports

    steps:
      # 1. Checkout Repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node (FIXED VERSION)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      # 3. Install Dependencies Clean
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      # 4. Fix React Native CLI (CRITICAL FIX)
      - name: Install React Native CLI Fix
        run: npm install @react-native-community/cli

      # 5. Create assets folder (IMPORTANT)
      - name: Create assets folder
        run: mkdir -p android/app/src/main/assets

      # 6. Bundle JS (CRASH FIXED)
      - name: Bundle React Native JS
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      # 7. Setup Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 8. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 9. Gradle Permission
      - name: Grant execute permission
        run: chmod +x android/gradlew

      # 10. Build Release APK
      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 11. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: elite-esports-apk
          path: artifacts/elite-esports/android/app/build/outputs/apk/release/app-release.apk
