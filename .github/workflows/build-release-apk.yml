name: Build Android APK (No Expo, Pure Gradle)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: artifacts/elite-esports

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node (for JS bundle)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Generate JS bundle (VERY IMPORTANT)
      - name: Bundle React Native JS
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      # 5. Setup Java (required for Gradle)
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 6. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 7. Grant permission to gradlew
      - name: Grant execute permission
        run: chmod +x android/gradlew

      # 8. Build Release APK
      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 9. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: elite-esports-apk
          path: artifacts/elite-esports/android/app/build/outputs/apk/release/app-release.apk
