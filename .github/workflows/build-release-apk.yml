name: Build Android APK (FINAL STABLE NO ERRORS)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: artifacts/elite-esports

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node (compatible)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Clean install (NO manual overrides)
      - name: Install dependencies clean
        run: |
          rm -rf node_modules package-lock.json
          npm install

      # ❌ IMPORTANT: REMOVE ALL MANUAL METRO INSTALLS
      # (No metro install here)

      # 4. Create assets folder
      - name: Create assets folder
        run: mkdir -p android/app/src/main/assets

      # 5. Bundle JS (PURE RN SYSTEM)
      - name: Bundle React Native JS
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      # 6. Setup Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 7. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 8. Grant permission
      - name: Grant execute permission
        run: chmod +x android/gradlew

      # 9. Build APK
      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 10. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: elite-esports-apk
          path: android/app/build/outputs/apk/release/app-release.apk
