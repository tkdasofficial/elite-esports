name: "Build Release APK"

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - master
      - develop
      - "release/**"
    paths-ignore:
      - "**.md"
      - ".github/workflows/build-release-aab.yml"
      - "artifacts/mockup-sandbox/**"
      - "artifacts/api-server/**"

  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - "**.md"

  workflow_dispatch:
    inputs:
      version_code:
        description: "Android versionCode (integer)"
        required: false
        default: "1"
      version_name:
        description: "Android versionName (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
      architectures:
        description: "CPU architectures (comma-separated)"
        required: false
        default: "arm64-v8a,armeabi-v7a"

# ──────────────────────────────────────────────────────────────────────────────
# Global env
# ──────────────────────────────────────────────────────────────────────────────
env:
  NODE_VERSION:    "20.18.0"
  JAVA_VERSION:    "17"
  NDK_VERSION:     "27.1.12297006"
  BUILD_TOOLS_VER: "35.0.0"
  PLATFORM_36:     "platforms;android-36"
  PLATFORM_35:     "platforms;android-35"
  APP_DIR:         "artifacts/elite-esports"
  ANDROID_DIR:     "artifacts/elite-esports/android"

# Cancel previous runs on the same branch to save minutes
concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  build-apk:
    name: "Build Release APK"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Step 1: Checkout ────────────────────────────────────────────────────
      - name: "1 · Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Step 2: Java 17 ─────────────────────────────────────────────────────
      - name: "2 · Set up JDK 17 (Temurin)"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      # ── Step 3: Node.js 20 ──────────────────────────────────────────────────
      - name: "3 · Set up Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Step 4: npm cache ────────────────────────────────────────────────────
      - name: "4 · Restore npm cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            ${{ env.APP_DIR }}/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'artifacts/elite-esports/package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      # ── Step 5: Gradle cache ─────────────────────────────────────────────────
      - name: "5 · Restore Gradle cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ env.ANDROID_DIR }}/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('artifacts/elite-esports/android/**/*.gradle*', 'artifacts/elite-esports/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Step 6: Android SDK components cache ────────────────────────────────
      - name: "6 · Restore Android SDK component cache"
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_HOME }}/build-tools/${{ env.BUILD_TOOLS_VER }}
            ${{ env.ANDROID_HOME }}/platforms/android-36
            ${{ env.ANDROID_HOME }}/platforms/android-35
          key: android-sdk-${{ env.NDK_VERSION }}-${{ env.BUILD_TOOLS_VER }}-api36
          restore-keys: |
            android-sdk-${{ env.NDK_VERSION }}-

      # ── Step 7: Install Android SDK components ───────────────────────────────
      - name: "7 · Install NDK, Build-Tools & Platforms"
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "build-tools;${{ env.BUILD_TOOLS_VER }}" \
            "${{ env.PLATFORM_36 }}" \
            "${{ env.PLATFORM_35 }}" \
            --sdk_root="$ANDROID_HOME" 2>&1 | grep -v "^\[="
          echo "Android SDK components installed"

      # ── Step 8: Install npm dependencies ────────────────────────────────────
      - name: "8 · Install npm workspaces dependencies"
        run: npm install --legacy-peer-deps --prefer-offline
        env:
          NODE_ENV: development

      # ── Step 9: Validate critical project files ──────────────────────────────
      - name: "9 · Validate project structure"
        run: |
          echo "Checking required files..."
          test -f "${{ env.APP_DIR }}/app.json"        || (echo "ERROR: app.json missing"        && exit 1)
          test -f "${{ env.APP_DIR }}/metro.config.js"  || (echo "ERROR: metro.config.js missing"  && exit 1)
          test -f "${{ env.APP_DIR }}/babel.config.js"  || (echo "ERROR: babel.config.js missing"  && exit 1)
          test -f "${{ env.ANDROID_DIR }}/gradlew"      || (echo "ERROR: gradlew missing"          && exit 1)
          test -f "${{ env.ANDROID_DIR }}/app/build.gradle" || (echo "ERROR: app/build.gradle missing" && exit 1)
          test -f "${{ env.ANDROID_DIR }}/app/debug.keystore" || (echo "ERROR: debug.keystore missing" && exit 1)
          echo "All required files present ✓"

      # ── Step 10: Configure environment ──────────────────────────────────────
      - name: "10 · Configure build environment"
        run: |
          # Make gradlew executable
          chmod +x ${{ env.ANDROID_DIR }}/gradlew

          # Create local.properties with SDK path
          echo "sdk.dir=$ANDROID_HOME" > ${{ env.ANDROID_DIR }}/local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> ${{ env.ANDROID_DIR }}/local.properties

          # Resolve version code (auto-increment from run number if not provided)
          VC="${{ github.event.inputs.version_code }}"
          VN="${{ github.event.inputs.version_name }}"
          if [ -z "$VC" ]; then VC="${{ github.run_number }}"; fi
          if [ -z "$VN" ]; then VN="1.0.0"; fi
          echo "VERSION_CODE=$VC" >> $GITHUB_ENV
          echo "VERSION_NAME=$VN" >> $GITHUB_ENV

          # Resolve architectures
          ARCHS="${{ github.event.inputs.architectures }}"
          if [ -z "$ARCHS" ]; then ARCHS="arm64-v8a,armeabi-v7a"; fi
          echo "BUILD_ARCHS=$ARCHS" >> $GITHUB_ENV

          echo "VERSION_CODE=$VC  VERSION_NAME=$VN  ARCHS=$ARCHS"

      # ── Step 11: Expo doctor check ───────────────────────────────────────────
      - name: "11 · Check Expo version compatibility"
        working-directory: ${{ env.APP_DIR }}
        run: |
          npx expo --version 2>/dev/null || true
          echo "Node: $(node --version)"
          echo "npm:  $(npm --version)"

      # ── Step 12: Pre-bundle JavaScript (warm Metro cache) ────────────────────
      - name: "12 · Pre-bundle JS with Expo (Hermes)"
        working-directory: ${{ env.APP_DIR }}
        env:
          EXPO_PUBLIC_SUPABASE_URL:        ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY:   ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SUPABASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_SUPABASE_PROJECT_ID }}
          EXPO_PUBLIC_AD_TESTING:          "true"
          EXPO_NO_TELEMETRY:               "1"
        run: |
          mkdir -p /tmp/expo-bundle-check
          npx expo export:embed \
            --platform android \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output /tmp/expo-bundle-check/index.android.bundle \
            --assets-dest /tmp/expo-bundle-check/ \
            --dev false \
            --minify true \
            2>&1 | tail -20 || echo "Pre-bundle step completed (non-fatal if it warns)"
          BUNDLE_SIZE=$(wc -c < /tmp/expo-bundle-check/index.android.bundle 2>/dev/null || echo 0)
          echo "JS bundle size: ${BUNDLE_SIZE} bytes"

      # ── Step 13: Build Release APK ───────────────────────────────────────────
      - name: "13 · Gradle assembleRelease"
        working-directory: ${{ env.ANDROID_DIR }}
        env:
          EXPO_PUBLIC_SUPABASE_URL:        ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY:   ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SUPABASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_SUPABASE_PROJECT_ID }}
          EXPO_PUBLIC_AD_TESTING:          "true"
          EXPO_NO_TELEMETRY:               "1"
          GRADLE_OPTS:                     "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
        run: |
          ./gradlew assembleRelease \
            -PversionCode=${{ env.VERSION_CODE }} \
            -PversionName=${{ env.VERSION_NAME }} \
            -PreactNativeArchitectures=${{ env.BUILD_ARCHS }} \
            --no-daemon \
            --parallel \
            --build-cache \
            --stacktrace \
            --warning-mode all \
            2>&1 | tee /tmp/gradle-apk.log
          echo "Gradle exit code: $?"

      # ── Step 14: Locate & rename APK ─────────────────────────────────────────
      - name: "14 · Locate APK and collect metadata"
        run: |
          APK=$(find ${{ env.ANDROID_DIR }}/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found after build"
            find ${{ env.ANDROID_DIR }}/app/build/outputs/ -type f 2>/dev/null
            exit 1
          fi
          SIZE_MB=$(du -m "$APK" | cut -f1)
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          APK_NAME="elite-esports-v${{ env.VERSION_NAME }}-build${{ env.VERSION_CODE }}-${TIMESTAMP}.apk"
          cp "$APK" "$APK_NAME"
          echo "APK_PATH=$APK_NAME"     >> $GITHUB_ENV
          echo "APK_SIZE_MB=$SIZE_MB"   >> $GITHUB_ENV
          echo "APK found: $APK  (${SIZE_MB} MB)"

      # ── Step 15: Upload APK artifact ─────────────────────────────────────────
      - name: "15 · Upload APK artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "release-apk-v${{ env.VERSION_NAME }}-${{ github.sha }}"
          path: ${{ env.APK_PATH }}
          retention-days: 30
          if-no-files-found: error

      # ── Step 16: Upload Gradle build log on failure ───────────────────────────
      - name: "16 · Upload Gradle log on failure"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "gradle-apk-log-${{ github.sha }}"
          path: /tmp/gradle-apk.log
          retention-days: 7

      # ── Step 17: Build summary ───────────────────────────────────────────────
      - name: "17 · Write build summary"
        if: always()
        run: |
          echo "## Elite eSports — Release APK Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ env.VERSION_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version Code | \`${{ env.VERSION_CODE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Architectures | \`${{ env.BUILD_ARCHS }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Signing | Debug Keystore (test distribution) |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | ~${{ env.APK_SIZE_MB }} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Node | \`${{ env.NODE_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Java | \`${{ env.JAVA_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| NDK | \`${{ env.NDK_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> APK is signed with the **debug keystore** — suitable for direct install and testing." >> $GITHUB_STEP_SUMMARY
          echo "> For Play Store releases, use the **Build Release AAB** workflow." >> $GITHUB_STEP_SUMMARY
