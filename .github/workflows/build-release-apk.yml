name: Build Android APK (Ultimate Fixed)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: artifacts/elite-esports

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node (FINAL FIX → 18)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Clean install
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      # 4. FIX ALL RN COMPATIBILITY
      - name: Fix React Native Environment
        run: |
          npm install @react-native-community/cli@latest
          npm install @react-native/metro-config@latest
          npm install metro@latest metro-config@latest metro-react-native-babel-preset@latest

      # 5. Create assets folder
      - name: Create assets folder
        run: mkdir -p android/app/src/main/assets

      # 6. Bundle JS (FINAL STABLE)
      - name: Bundle React Native JS
        run: |
          node node_modules/react-native/cli.js bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      # 7. Setup Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 8. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 9. Grant permission
      - name: Grant execute permission
        run: chmod +x android/gradlew

      # 10. Build APK
      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 11. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: elite-esports-apk
          path: artifacts/elite-esports/android/app/build/outputs/apk/release/app-release.apk
